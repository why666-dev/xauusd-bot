name: XAUUSD Bot — Live Paper Trading

on:
  schedule:
    # ── US MARKET SCHEDULE (public repo = unlimited minutes) ──
    # XAUUSD trades London+NY overlap — starts at London open
    # London open: 8:00 AM GMT = 1:30 PM IST → start 1:25 PM IST
    # EDT (Summer): London 8:00 AM GMT = 8:00 AM UTC → start 7:55 AM UTC
    - cron: "55 7 * * 1-5"    # EDT — Mar to Nov
    # EST (Winter): London 8:00 AM GMT = 8:00 AM UTC (same — London doesn't change)
    # NY close: 4:05 PM ET + 5min = ends ~10:05 PM UTC
    # Total runtime: ~14h 10min → need 870 min timeout
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 480       # 8 hours — covers full London+NY session

    env:
      CAPITAL_API_KEY:       ${{ secrets.CAPITAL_API_KEY }}
      CAPITAL_EMAIL:         ${{ secrets.CAPITAL_EMAIL }}
      CAPITAL_PASSWORD:      ${{ secrets.CAPITAL_PASSWORD }}
      TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm Capital.com connection
        run: |
          python - << 'PYEOF'
          import os, requests
          key      = os.environ["CAPITAL_API_KEY"]
          email    = os.environ["CAPITAL_EMAIL"]
          password = os.environ["CAPITAL_PASSWORD"]
          r = requests.post(
            "https://demo-api-capital.backend-capital.com/api/v1/session",
            headers={"X-CAP-API-KEY": key, "Content-Type": "application/json"},
            json={"identifier": email, "password": password}, timeout=10
          )
          r.raise_for_status()
          print(f"✅ Capital.com Demo Connected | Status: {r.status_code}")
          PYEOF

      - name: Run XAUUSD Bot
        run: python main.py
