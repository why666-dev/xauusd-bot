name: XAUUSD Bot — Live Paper Trading

on:
  schedule:
    # Start at 1:25 PM IST (07:55 UTC) Mon–Fri — before London open
    - cron: "55 7 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 480   # 8 hours covers full session

    env:
      CAPITAL_API_KEY:       ${{ secrets.CAPITAL_API_KEY }}
      CAPITAL_EMAIL:         ${{ secrets.CAPITAL_EMAIL }}
      CAPITAL_PASSWORD:      ${{ secrets.CAPITAL_PASSWORD }}
      TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm Capital.com connection
        run: |
          python - << 'PYEOF'
          import os, requests
          key      = os.environ["CAPITAL_API_KEY"]
          email    = os.environ["CAPITAL_EMAIL"]
          password = os.environ["CAPITAL_PASSWORD"]
          r = requests.post(
            "https://demo-api-capital.backend-capital.com/api/v1/session",
            headers={"X-CAP-API-KEY": key, "Content-Type": "application/json"},
            json={"identifier": email, "password": password}, timeout=10
          )
          r.raise_for_status()
          print(f"✅ Capital.com Demo Connected | Status: {r.status_code}")
          PYEOF

      - name: Run XAUUSD Bot
        run: python main.py
